
    <!doctype html>
<!--
  Program name: patient-form.html
  Author: Shafin Husain
  Date created: 6-18-26
  Date last edited: 6-18-26
  Version: 1.0
  Description: HTML documentation for CareFirst Medical and HW1
-->


<html>
    <head>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="Banner">
         <img src="logo.jpg" name="clinic-logo" alt="Logo" width="100" height="100">

         <h2>CareFirst Medical</h2>
           <div class="date-box">
         Today's date: <span id="today"></span>
    </div>
 </div>

    <hr>

    <div style= "font-family:verdana;">
        <h3>Patient Registration Portal</h3>

        <form action="thankyou.html">
            
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="first_name" maxlength="30" required><br>

            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="last_name" maxlength="30" required><br>

            <label for="dob">Date of Birth:</label>
            <input type="text" id="dob" name="date_of_birth" placeholder="MM/DD/YYYY" required><br>

            <label for="address1">Address Line 1:</label>
            <input type="text" id="address1" name="address_line_1" maxlength="30" required><br>

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" name="phone_number" placeholder="(XXX-XXX-XXXX)" pattern="\(\d{3}\)-\d{3}-\d{4}" required><br>

            <label for="city">City:</label>
            <input type="text" id="city" name="city_name" maxlength="30" required><br>

        <label for="state">State:</label>
        <select id="state" name="state_code" required>
            <option value="">--Select State--</option>
            <option value="AL">Alabama</option>
            <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <option value="CO">Colorado</option>
            <option value="CT">Connecticut</option>
            <option value="DE">Delaware</option>
            <option value="DC">District Of Columbia</option>
            <option value="FL">Florida</option>
            <option value="GA">Georgia</option>
            <option value="HI">Hawaii</option>
            <option value="ID">Idaho</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="IA">Iowa</option>
            <option value="KS">Kansas</option>
            <option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option>
            <option value="ME">Maine</option>
            <option value="MD">Maryland</option>
            <option value="MA">Massachusetts</option>
            <option value="MI">Michigan</option>
            <option value="MN">Minnesota</option>
            <option value="MS">Mississippi</option>
            <option value="MO">Missouri</option>
            <option value="MT">Montana</option>
            <option value="NE">Nebraska</option>
            <option value="NV">Nevada</option>
            <option value="NH">New Hampshire</option>
            <option value="NJ">New Jersey</option>
            <option value="NM">New Mexico</option>
            <option value="NY">New York</option>
            <option value="NC">North Carolina</option>
            <option value="ND">North Dakota</option>
            <option value="OH">Ohio</option>
            <option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option>
            <option value="PA">Pennsylvania</option>
            <option value="RI">Rhode Island</option>
            <option value="SC">South Carolina</option>
            <option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option>
            <option value="TX">Texas</option>
            <option value="UT">Utah</option>
            <option value="VT">Vermont</option>
            <option value="VA">Virginia</option>
            <option value="WA">Washington</option>
            <option value="WV">West Virginia</option>
            <option value="WI">Wisconsin</option>
            <option value="WY">Wyoming</option>
            <option value="PR">Puerto Rico</option>
        </select><br>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email_address" required><br>

            <label for="bloodType">Blood Type:</label>
            <select id="bloodType" name="blood_type">
                <option value="">--Select--</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB-">AB-</option>
                <option value="AB+">AB+</option>
            </select><br>

            <label for="symptoms" style="vertical-align: top;">Current Symptoms:</label>
            <textarea id="symptoms" name="user_symptoms" rows="3" cols="50"></textarea><br>

            <label>Medical Allergies:</label>
            <input type="checkbox" id="alg1" name="allergies" value="seafood">
            <label for="alg1" style="width:auto; font-weight:normal;">Seafood</label>
            
            <input type="checkbox" id="alg2" name="allergies" value="peanuts">
            <label for="alg2" style="width:auto; font-weight:normal;">Peanuts</label>
            
            <input type="checkbox" id="alg3" name="allergies" value="sulfa">
            <label for="alg3" style="width:auto; font-weight:normal;">Sulfa Drugs</label>
            
            <input type="checkbox" id="alg4" name="allergies" value="penicillin">
            <label for="alg4" style="width:auto; font-weight:normal;">Penicillin</label>
            
            <input type="checkbox" id="alg5" name="allergies" value="latex">
            <label for="alg5" style="width:auto; font-weight:normal;">Latex</label><br>

            <label>Gender Identity:</label>
            <input type="radio" id="genM" name="gender" value="male">
            <label for="genM" style="width:auto; font-weight:normal;">Male</label>
            
            <input type="radio" id="genF" name="gender" value="female">
            <label for="genF" style="width:auto; font-weight:normal;">Female</label>
            
            <input type="radio" id="genN" name="gender" value="nonbinary">
            <label for="genN" style="width:auto; font-weight:normal;">Non-Binary</label><br>

            <label>Tobacco User?</label>
            <input type="radio" id="tobY" name="tobacco" value="yes">
            <label for="tobY" style="width:auto; font-weight:normal;">Yes</label>
            
            <input type="radio" id="tobN" name="tobacco" value="no">
            <label for="tobN" style="width:auto; font-weight:normal;">No</label><br>

            <label for="health">Rate Health Status:</label>
            <input type="range" id="health" name="health_rating" min="1" max="10"><br>


            <label for="uid">UserID:</label>
            <input type="text" id="uid" name="user_id" maxlength="20" placeholder="Max 20 chars" required><br>
            
            <label for="pwd">Password:</label>
            <input type="password" id="pwd" name="password" required><br>
            
            <label for="rePwd">Re-enter Password:</label>
            <input type="password" id="rePwd" name="re_password" required><br>

            <br><br>
            <input type="reset" value="CLEAR AND START OVER" class="form-btn">
            <input type="submit" value="Submit" class="form-btn">


            
        
    <script>
        const d = new Date();
        let text = d.toLocaleDateString();
        document.getElementById("today").innerHTML = text;
    </script>
    
</body>
</html>
