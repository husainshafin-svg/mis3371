<html>
<head>
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div id="Banner">
         <img src="logo.jpg" name="clinic-logo" alt="Logo" width="100" height="100">
         <h2>CareFirst Medical</h2>
         <div class="date-box">
              Today's date: <span id="today"></span>

    <hr>

        <div>
            <strong>CareFirst Medical</strong><br>
            PO BOX 12345<br>
            Pearland TX 77584
        </div>
        <div>
        </div>
        <div>
            <a href="#">Facebook</a> | <a href="#">Twitter</a>
        </div>
    </div>

    <script>
        const d = new Date();
        let text = d.toLocaleDateString();
        document.getElementById("today").innerHTML = text;
    </script>
    
</body>
</html>
